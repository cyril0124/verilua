<svg xmlns="http://www.w3.org/2000/svg" viewBox="107 23 146 154" role="img" aria-labelledby="logo-title logo-desc">
  <title id="logo-title">Verilua mark</title>
  <desc id="logo-desc">A minimalist Verilua V mark.</desc>
  <defs>
    <!-- userSpaceOnUse coords are in the path's local coordinate system -->
    <linearGradient id="mark-gradient" x1="28" y1="24" x2="116" y2="132" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#29C2FF"/>
      <stop offset="1" stop-color="#5B5DFF"/>
    </linearGradient>
    <style>
      .mark {
        fill: none;
        stroke: url(#mark-gradient);
        stroke-width: 18;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .accent {
        fill: none;
        stroke: #29C2FF;
        stroke-width: 10;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
    </style>
  </defs>

  <g transform="translate(108 24)">
    <path class="mark" d="M20 20 L72 132 L124 20"/>
    <path class="accent" d="M46 58 H72 V84 H90"/>
  </g>
</svg>
